name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Rust version
        id: rust-version
        run: echo "channel=$(grep 'channel' rust-toolchain.toml | sed 's/.*= *\"\(.*\)\"/\1/')" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.channel }}
          targets: x86_64-unknown-none
          components: clippy, rustfmt, llvm-tools-preview, rust-src

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy workspace
        run: cargo clippy -- -D warnings

      - name: Clippy example
        working-directory: examples
        run: cargo clippy -- -D warnings

      - name: Clippy unit tests
        working-directory: qemu-tests/unit
        run: cargo clippy -- -D warnings

      - name: Clippy tulip example
        working-directory: examples-tulip
        run: cargo clippy -- -D warnings

      - name: Build disk images
        run: |
          cargo build --manifest-path examples/Cargo.toml --target x86_64-unknown-none
          cargo build --manifest-path qemu-tests/unit/Cargo.toml --target x86_64-unknown-none
          cargo run -p embclox-mkimage -- target/x86_64-unknown-none/debug/embclox-example target/x86_64-unknown-none/debug/embclox-example.img
          cargo run -p embclox-mkimage -- target/x86_64-unknown-none/debug/embclox-unit-tests target/x86_64-unknown-none/debug/embclox-unit-tests.img

      - name: Install QEMU and OVMF
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 ovmf netcat-openbsd xorriso

      - name: QEMU tests
        run: |
          cmake -B build
          cmake --build build --target tulip-image
          ctest --test-dir build --output-on-failure
