timeout: 0
serial: yes
verbose: yes

# Default entry (entry 0) is the static config used by hyperv-boot-test.ps1
# against the dedicated `embclox-test` Internal vSwitch (host = 192.168.234.1/24).
# See docs/dev/HyperV-Testing.md for vSwitch setup and rationale.
#
# To switch to DHCP (e.g. for Azure deployment), swap the entry order
# here and rebuild the ISO. With `timeout: 0` Limine boots entry 0
# without showing a menu, so the order in this file determines the mode.

/embclox Hyper-V Example (static IP 192.168.234.50/24)
    protocol: limine
    kernel_path: boot():/boot/kernel

/embclox Hyper-V Example (DHCP)
    protocol: limine
    kernel_path: boot():/boot/kernel
    cmdline: net=dhcp
