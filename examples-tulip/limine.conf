timeout: 0
serial: yes
verbose: yes

# Default entry (entry 0) is DHCP — required by the QEMU SLIRP CI test.
# The static entry exists for Hyper-V manual testing on the dedicated
# `embclox-test` Internal vSwitch (see docs/dev/HyperV-Testing.md).
# To boot it on Hyper-V, edit this file on the ISO or rebuild after
# swapping the entry order; with `timeout: 0` Limine boots entry 0
# without showing a menu.

/embclox Tulip Example (DHCP)
    protocol: limine
    kernel_path: boot():/boot/kernel
    cmdline: net=dhcp

/embclox Tulip Example (static IP 192.168.234.50/24)
    protocol: limine
    kernel_path: boot():/boot/kernel
    cmdline: net=static
